<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#00335C">
<title>#FokusCapital Project — PCPM 41</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1EDE1;
    --card:#FFFFFF;
    --card-2:#FAF7EE;
    --ink:#12253F;
    --ink-soft:#55627D;
    --ink-faint:#8B93A8;
    --blue:#005596;
    --blue-deep:#00335C;
    --blue-mid:#0B4A80;
    --gold:#A8802B;
    --gold-soft:#D9BC6B;
    --teal:#256B60;
    --teal-soft:#DCEAE6;
    --seal:#B23A2E;
    --line:#DDD6C3;
    --line-strong:#C3BAA0;
    --radius:14px;
    --radius-sm:10px;
    --shadow:0 1px 3px rgba(18,37,63,.06), 0 4px 14px rgba(18,37,63,.06);
    --shadow-lg:0 10px 32px rgba(18,37,63,.16);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      repeating-linear-gradient(0deg, rgba(18,37,63,.015) 0 1px, transparent 1px 3px);
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  h1,h2,h3,h4{font-family:'Fraunces',serif;margin:0;letter-spacing:-.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--gold); outline-offset:2px; border-radius:4px;
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation:none!important;transition:none!important;}
  }

  /* ===================== HEADER ===================== */
  header.app-header{
    position:relative;
    background:linear-gradient(160deg,var(--blue-deep) 0%,#003E6E 55%,var(--blue) 100%);
    color:#F3EEE0;
    padding:30px 20px 26px;
    overflow:hidden;
  }
  header.app-header::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      repeating-radial-gradient(circle at 12% -20%, transparent 0, rgba(217,188,107,.10) 1.5px, transparent 3px, transparent 11px),
      repeating-radial-gradient(circle at 105% 130%, transparent 0, rgba(255,255,255,.06) 1.5px, transparent 3px, transparent 13px);
  }
  header.app-header::after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:4px;
    background:repeating-linear-gradient(90deg,var(--gold-soft) 0 14px, transparent 14px 22px);
    opacity:.85;
  }
  .header-inner{position:relative;max-width:1000px;margin:0 auto;}
  .header-topline{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .header-logo-badge{
    display:inline-flex;align-items:center;background:#fff;
    padding:9px 15px;border-radius:10px;box-shadow:0 5px 18px rgba(0,0,0,.28);
  }
  .header-logo-badge img{height:25px;width:auto;display:block;}
  .header-serial{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.16em;
    color:rgba(243,238,224,.66);text-transform:uppercase;text-align:right;line-height:1.7;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--gold-soft);margin-bottom:8px;
  }
  header.app-header h1{font-size:clamp(26px,4.6vw,38px);font-weight:600;color:#FCF8EC;}
  header.app-header p.subtitle{
    margin:4px 0 0;font-family:'IBM Plex Mono',monospace;font-size:12px;
    letter-spacing:.06em;color:var(--gold-soft);font-style:italic;
  }
  header.app-header p.tag{margin:8px 0 0;font-size:13.5px;color:#CBD6E2;max-width:600px;}
  .header-meta{margin-top:18px;display:flex;gap:8px;flex-wrap:wrap;}
  .meta-pill{
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;
    background:rgba(255,255,255,.07);border:1px solid rgba(217,188,107,.35);
    color:#F0E5C9;padding:5px 11px;border-radius:999px;
  }

  /* ===================== NAV ===================== */
  nav.tabs-wrap{
    position:sticky;top:0;z-index:30;
    background:rgba(241,237,225,.92);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line-strong);
  }
  nav.tabs-wrap .tabs{
    display:flex;gap:6px;overflow-x:auto;padding:10px 14px;
    max-width:1000px;margin:0 auto;scrollbar-width:none;
  }
  nav.tabs-wrap .tabs::-webkit-scrollbar{height:0;}
  .tab-btn{
    flex:0 0 auto;background:var(--card);border:1px solid var(--line);
    color:var(--ink-soft);font-size:13px;font-weight:600;
    padding:9px 15px;border-radius:999px;white-space:nowrap;
    transition:background .15s ease,color .15s ease,border-color .15s ease;
    min-height:38px;
  }
  .tab-btn .count{
    font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:10.5px;
    color:var(--ink-faint);margin-left:7px;
  }
  .tab-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);box-shadow:var(--shadow);}
  .tab-btn.active .count{color:var(--gold-soft);}

  main{max-width:1000px;margin:0 auto;padding:18px 16px 90px;}
  .tab-panel{display:none;animation:fadeIn .28s ease;}
  .tab-panel.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

  /* ===================== GENERIC ===================== */
  .card{
    background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:18px 18px;box-shadow:var(--shadow);
  }
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  @media (max-width:760px){.grid-3{grid-template-columns:1fr;}}
  .section-title{
    font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:.14em;color:var(--blue);margin:0 0 12px;
  }
  .progress-bar{height:7px;border-radius:99px;background:var(--card-2);border:1px solid var(--line);overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:99px;transition:width .4s ease;}

  /* ===================== HERO COUNTDOWN TICKET ===================== */
  .hero-ticket{
    position:relative;display:flex;margin-bottom:16px;
    background:linear-gradient(150deg,var(--blue-deep),var(--blue-mid));
    border-radius:var(--radius);color:#F3EEE0;overflow:hidden;
    box-shadow:var(--shadow-lg);
  }
  .hero-ticket::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      repeating-radial-gradient(circle at -6% 120%, transparent 0, rgba(217,188,107,.12) 1.5px, transparent 3px, transparent 10px),
      repeating-radial-gradient(circle at 110% -30%, transparent 0, rgba(255,255,255,.05) 1.5px, transparent 3px, transparent 12px);
  }
  .ht-main{flex:1;padding:22px 20px 20px;position:relative;min-width:0;}
  .ht-eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--gold-soft);margin-bottom:10px;
  }
  .ht-label{font-family:'Fraunces',serif;font-size:clamp(19px,3.4vw,26px);font-weight:600;line-height:1.22;}
  .ht-date{
    margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;
    color:#C4D2E0;letter-spacing:.04em;
  }
  .ht-barcode{
    margin-top:16px;height:22px;max-width:190px;opacity:.8;
    background:repeating-linear-gradient(90deg,#F3EEE0 0 2px,transparent 2px 4px,#F3EEE0 4px 5px,transparent 5px 9px,#F3EEE0 9px 12px,transparent 12px 14px);
  }
  .ht-serial{margin-top:5px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.22em;color:rgba(243,238,224,.55);}
  .ht-stub{
    position:relative;flex:0 0 148px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:18px 12px;
    border-left:2px dashed rgba(243,238,224,.4);
    background:rgba(0,0,0,.14);
  }
  .ht-stub::before,.ht-stub::after{
    content:"";position:absolute;left:-9px;width:16px;height:16px;border-radius:50%;
    background:var(--paper);
  }
  .ht-stub::before{top:-8px;}
  .ht-stub::after{bottom:-8px;}
  .ht-h{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(40px,9vw,62px);line-height:1;color:#FCF8EC;}
  .ht-h .hprefix{font-size:.42em;vertical-align:.62em;color:var(--gold-soft);margin-right:2px;}
  .ht-h.today{font-size:clamp(24px,5vw,32px);color:var(--gold-soft);text-align:center;line-height:1.15;}
  .ht-hsub{margin-top:6px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#C4D2E0;}
  @media (max-width:560px){
    .ht-stub{flex-basis:118px;}
  }

  /* ===================== TODAY STRIP ===================== */
  .today-card{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-bottom:14px;}
  .today-left{min-width:0;}
  .today-left .date-big{font-family:'Fraunces',serif;font-size:21px;font-weight:600;}
  .today-left .date-sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .today-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
  .badge{font-size:10.5px;font-family:'IBM Plex Mono',monospace;padding:3px 9px;border-radius:6px;font-weight:600;}
  .badge.sun{background:var(--card-2);color:var(--ink-faint);border:1px solid var(--line);}
  .badge.live{background:#F1E6D4;color:#8A5A22;border:1px solid #E0C9A2;}
  .badge.rec{background:var(--blue);color:#fff;}
  .badge.event{background:var(--seal);color:#fff;}
  .studied-toggle{
    display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;
    background:var(--card-2);border:1px solid var(--line);border-radius:999px;
    padding:9px 16px;cursor:pointer;user-select:none;min-height:44px;
    transition:border-color .15s ease, background .15s ease;
  }
  .studied-toggle input{position:absolute;opacity:0;}
  .studied-toggle .st-dot{
    width:20px;height:20px;border-radius:50%;border:2px solid var(--line-strong);
    display:flex;align-items:center;justify-content:center;transition:all .18s ease;flex:0 0 20px;
  }
  .studied-toggle input:checked + .st-dot{
    background:var(--teal);border-color:var(--teal);transform:rotate(-8deg);
    box-shadow:0 0 0 3px rgba(37,107,96,.18);
  }
  .studied-toggle input:checked + .st-dot::after{content:"✓";color:#fff;font-size:11px;font-weight:700;}
  .studied-toggle:has(input:checked){border-color:var(--teal);background:var(--teal-soft);}

  /* ===================== REKOMENDASI ===================== */
  .rec-wrap{margin-bottom:14px;}
  .rec-quote{
    position:relative;font-family:'Fraunces',serif;font-style:italic;
    font-size:15.5px;color:var(--blue-deep);margin:0 0 16px;line-height:1.45;
    padding-left:14px;border-left:3px solid var(--gold-soft);
  }
  .rec-blocks{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;}
  .rec-block{
    background:var(--card-2);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:13px 14px;border-left-width:4px;
  }
  .rec-block.rb-1{border-left-color:var(--blue);}
  .rec-block.rb-2{border-left-color:var(--teal);}
  .rec-block.rb-3{border-left-color:var(--gold);}
  .rec-head{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .rec-head .rec-title{font-size:13px;font-weight:600;line-height:1.3;}
  .rec-target{font-size:12.5px;color:var(--ink-soft);margin-bottom:9px;}
  .rec-target b{color:var(--ink);font-size:14px;}
  .rec-done{font-size:12.5px;color:var(--teal);font-weight:600;margin-bottom:9px;}
  .rec-selects{display:flex;gap:8px;margin-bottom:9px;}
  .rec-selects label{flex:1;font-size:10.5px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);}
  .rec-selects select{
    width:100%;margin-top:4px;border:1px solid var(--line);border-radius:8px;
    padding:8px 8px;font-size:12.5px;background:#fff;min-height:38px;
  }
  .rec-nlc{font-size:11.5px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;line-height:1.55;}
  .rec-note{font-size:11.5px;color:var(--ink-faint);margin-top:13px;line-height:1.55;}

  /* ===================== TWEET ===================== */
  .tweet-wrap{display:flex;flex-direction:column;margin-bottom:14px;}
  .tweet-wrap .twitter-tweet{margin:0 auto !important;}
  .tweet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .tweet-nav{display:flex;align-items:center;gap:9px;}
  .tweet-nav-btn{
    width:32px;height:32px;border-radius:50%;border:1px solid var(--line-strong);
    background:var(--card);color:var(--ink);font-size:16px;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0;
    transition:all .15s ease;
  }
  .tweet-nav-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
  .tweet-count{font-size:11px;color:var(--ink-faint);}

  /* ===================== PROGRESS ===================== */
  .overall-wrap{margin-bottom:12px;}
  .overall-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
  .overall-row .num{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--blue);}
  .tahap-mini{
    padding:15px 15px 14px;border-radius:var(--radius-sm);background:var(--card);
    border:1px solid var(--line);border-top-width:4px;box-shadow:var(--shadow);
  }
  .tahap-mini.tm-1{border-top-color:var(--blue);}
  .tahap-mini.tm-2{border-top-color:var(--teal);}
  .tahap-mini.tm-3{border-top-color:var(--gold);}
  .tahap-mini h4{font-size:14.5px;margin-bottom:4px;line-height:1.3;}
  .tahap-mini .frac{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);margin-bottom:9px;}
  .tahap-mini .pace{font-size:11.5px;color:var(--blue);margin-top:9px;line-height:1.45;font-weight:500;}
  .tahap-mini .deadline{font-size:11px;color:var(--ink-faint);margin-top:4px;font-family:'IBM Plex Mono',monospace;}

  /* ===================== ROADMAP ===================== */
  .roadmap-wrap{margin-top:14px;}
  .rm-chart{position:relative;padding-top:36px;padding-bottom:28px;}
  .rm-row{display:flex;align-items:center;gap:14px;margin-bottom:11px;position:relative;z-index:1;}
  .rm-label{flex:0 0 62px;font-size:12.5px;font-weight:600;}
  .rm-track{position:relative;flex:1;height:24px;background:var(--card-2);border:1px solid var(--line);border-radius:7px;overflow:visible;}
  .rm-bar{position:absolute;left:-1px;top:-1px;height:24px;border-radius:7px 0 0 7px;opacity:.9;}
  .rm-bar.rm-t1{background:var(--blue);}
  .rm-bar.rm-t2{background:var(--teal);}
  .rm-bar.rm-t3{background:var(--gold);}
  .rm-cutoff{position:absolute;top:-4px;width:2px;height:31px;background:var(--ink);transform:translateX(-1px);}
  .rm-axis{position:relative;height:18px;margin-top:6px;margin-left:76px;}
  .rm-tick{position:absolute;top:0;transform:translateX(-50%);border-left:1px solid var(--line-strong);height:8px;}
  .rm-tick-label{position:absolute;top:10px;left:0;transform:translateX(-50%);font-size:10.5px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
  .rm-axis-edges{display:flex;justify-content:space-between;margin-left:76px;margin-top:16px;font-size:11px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;}
  .rm-today{position:absolute;top:0;bottom:0;transform:translateX(-50%);z-index:2;margin-left:76px;display:flex;flex-direction:column;align-items:center;pointer-events:none;}
  .rm-today-pill{background:var(--ink);color:#fff;font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:999px;white-space:nowrap;font-family:'IBM Plex Mono',monospace;}
  .rm-today-line{flex:1;width:0;border-left:1.5px dashed var(--ink-faint);margin-top:2px;}

  /* ===================== TIMELINE / TICKETS ===================== */
  .timeline-card{margin-top:14px;}
  .seg{display:flex;gap:0;margin-top:10px;border:1px solid var(--line-strong);border-radius:999px;overflow:hidden;background:var(--card-2);}
  .seg-btn{
    flex:1;border:none;background:transparent;color:var(--ink-soft);
    font-size:12.5px;font-weight:600;padding:11px 10px;min-height:44px;
    transition:background .15s ease,color .15s ease;
  }
  .seg-btn + .seg-btn{border-left:1px solid var(--line-strong);}
  .seg-btn.active{background:var(--blue-deep);color:#FCF8EC;}
  .seg-btn .seg-sub{display:block;font-family:'IBM Plex Mono',monospace;font-weight:400;font-size:10px;letter-spacing:.06em;color:inherit;opacity:.7;margin-top:1px;}
  .ticket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:11px;margin-top:14px;}
  .ticket{
    position:relative;display:flex;background:var(--card);
    border:1px solid var(--line-strong);border-radius:var(--radius-sm);overflow:hidden;
  }
  .ticket.next{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue), var(--shadow);}
  .ticket-date{
    position:relative;flex:0 0 62px;background:var(--blue-deep);color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;
    border-right:2px dashed rgba(241,237,225,.55);
  }
  .ticket.past .ticket-date{background:var(--ink-faint);}
  .ticket-date::before,.ticket-date::after{
    content:"";position:absolute;right:-7px;width:12px;height:12px;border-radius:50%;background:var(--card);z-index:1;
    border:1px solid var(--line-strong);
  }
  .ticket-date::before{top:-7px;}
  .ticket-date::after{bottom:-7px;}
  .ticket-date .d{font-size:20px;font-weight:600;line-height:1;}
  .ticket-date .m{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;margin-top:3px;}
  .ticket-body{padding:10px 12px;flex:1;position:relative;min-width:0;}
  .ticket-body .lbl{font-size:12.5px;font-weight:600;line-height:1.3;padding-right:44px;}
  .ticket-body .range{font-size:10.5px;color:var(--ink-faint);margin-top:4px;font-family:'IBM Plex Mono',monospace;}
  .ticket-body .hbadge{
    position:absolute;top:9px;right:10px;font-family:'IBM Plex Mono',monospace;
    font-size:10px;font-weight:700;color:var(--seal);
  }
  .ticket.next .hbadge{color:var(--blue);}
  .timeline-more{
    margin-top:12px;width:100%;background:none;border:1px dashed var(--line-strong);
    color:var(--ink-soft);font-size:12px;font-weight:600;padding:10px;border-radius:var(--radius-sm);
    min-height:42px;transition:all .15s ease;
  }
  .timeline-more:hover{border-color:var(--blue);color:var(--blue);}

  .info-callout{
    background:var(--teal-soft);border:1px solid #BBD8D0;border-radius:var(--radius-sm);
    padding:13px 15px;font-size:12.5px;color:#1E4A42;margin-top:14px;line-height:1.6;
  }
  .info-callout b{color:var(--teal);}
  .reset-row{margin-top:22px;text-align:right;}
  .build-stamp{text-align:right;font-size:10px;color:var(--ink-faint);opacity:.65;margin-top:6px;}
  .btn-ghost{background:none;border:1px solid var(--line-strong);color:var(--ink-faint);font-size:11.5px;padding:9px 14px;border-radius:999px;min-height:38px;}
  .btn-ghost.danger{color:var(--seal);border-color:#D8B0A8;}
  .btn-ghost.danger:hover{background:var(--seal);color:#fff;border-color:var(--seal);}

  /* ===================== TAHAP TABS ===================== */
  .tahap-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
  .tahap-head h2{font-size:21px;}
  .tahap-head .sub{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}
  .tahap-head .total-frac{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--blue);font-weight:600;}
  .category{margin-bottom:13px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--card);box-shadow:var(--shadow);}
  .category-head{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none;background:var(--card-2);min-height:50px;}
  .category-head .step-tag{
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--blue);
    border:1px solid var(--blue);padding:2px 7px;border-radius:5px;font-weight:600;flex:0 0 auto;
  }
  .category-head h3{font-size:14.5px;flex:1;}
  .category-head .done-seal{
    font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.1em;
    color:var(--seal);border:1.5px solid var(--seal);border-radius:4px;padding:2px 6px;
    transform:rotate(-4deg);display:none;
  }
  .category.is-done .done-seal{display:inline-block;}
  .category-head .cfrac{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);white-space:nowrap;}
  .category-head .chev{transition:transform .2s ease;color:var(--ink-faint);font-size:12px;}
  .category.collapsed .chev{transform:rotate(-90deg);}
  .category-bar{height:5px;background:var(--line);}
  .category-bar-fill{height:100%;background:var(--gold);transition:width .35s ease;}
  .item-list{display:grid;grid-template-columns:repeat(2,1fr);gap:0;}
  @media (max-width:680px){.item-list{grid-template-columns:1fr;}}
  .category.collapsed .item-list{display:none;}
  .item-row{display:flex;align-items:center;padding:0;border-top:1px solid var(--line);font-size:13px;}
  .item-row label{display:flex;align-items:center;gap:11px;cursor:pointer;width:100%;padding:11px 16px;min-height:46px;transition:background .12s ease;}
  .item-row label:hover{background:var(--card-2);}
  .stamp{
    flex:0 0 19px;width:19px;height:19px;border-radius:50%;
    border:2px solid var(--line-strong);position:relative;transition:all .16s ease;
  }
  input.item-checkbox{position:absolute;opacity:0;width:19px;height:19px;margin:0;cursor:pointer;}
  .item-row input.item-checkbox:checked + .stamp{
    background:var(--blue);border-color:var(--blue);transform:rotate(-8deg) scale(1.06);
    box-shadow:0 0 0 3px rgba(0,85,150,.15);
  }
  .item-row input.item-checkbox:checked + .stamp::after{
    content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:11px;font-weight:700;
  }
  .item-row .item-label{color:var(--ink);transition:color .15s ease;}
  .item-row input.item-checkbox:checked ~ .item-label{color:var(--ink-faint);text-decoration:line-through;}

  /* ===================== WEEKLY ===================== */
  .week-card{border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;background:var(--card);box-shadow:var(--shadow);}
  .week-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;background:var(--card-2);min-height:50px;}
  .week-head .wnum{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);border:1px solid var(--line-strong);padding:2px 7px;border-radius:5px;}
  .week-head .wrange{font-weight:600;font-size:13.5px;flex:1;}
  .week-head .wstat{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);}
  .week-card.current .week-head{background:#F6EBD3;}
  .week-card.current .wnum{border-color:var(--gold);color:var(--gold);}
  .week-card.collapsed .week-body{display:none;}
  .week-head .chev{color:var(--ink-faint);font-size:12px;transition:transform .2s;}
  .week-card.collapsed .chev{transform:rotate(-90deg);}
  .day-row{display:grid;grid-template-columns:80px 1fr 1fr 30px;gap:8px;align-items:center;padding:9px 14px;border-top:1px solid var(--line);font-size:12.5px;min-height:46px;}
  @media (max-width:680px){.day-row{grid-template-columns:66px 1fr 30px;}.day-row .note-input{display:none;}}
  .day-row.is-sunday{background:#F7F4EC;color:var(--ink-faint);}
  .day-row .dname{font-family:'IBM Plex Mono',monospace;font-size:11.5px;}
  .day-badges{display:flex;gap:4px;flex-wrap:wrap;}
  .note-input{width:100%;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:12px;background:#fff;}
  .day-checkbox{width:20px;height:20px;accent-color:var(--teal);}

  /* ===================== TOAST ===================== */
  #toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;
    font-size:12.5px;opacity:0;pointer-events:none;transition:all .25s ease;z-index:50;
    max-width:88vw;text-align:center;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

/* ================= STATE / STORAGE ================= */
function defaultState(){
  return { scenario:'agustus', items:{}, days:{} };
}
let state = defaultState();
let storageOK = true;
let saveTimer = null;

const STORAGE_KEY = 'pcpm41-state';

function makeMemoryAdapter(){
  const mem = {};
  return {
    async get(key){ return (key in mem) ? {key, value:mem[key]} : null; },
    async set(key, value){ mem[key] = value; return {key, value}; }
  };
}
function makeLocalStorageAdapter(){
  return {
    async get(key){
      const v = window.localStorage.getItem(key);
      return v===null ? null : {key, value:v};
    },
    async set(key, value){
      window.localStorage.setItem(key, value);
      return {key, value};
    }
  };
}
function detectStorageAdapter(){
  if(typeof window!=='undefined' && window.storage && typeof window.storage.get==='function' && typeof window.storage.set==='function'){
    return { kind:'claude', adapter: window.storage };
  }
  try{
    const testKey = '__pcpm41_test__';
    window.localStorage.setItem(testKey, '1');
    window.localStorage.removeItem(testKey);
    return { kind:'localStorage', adapter: makeLocalStorageAdapter() };
  }catch(e){
    return { kind:'memory', adapter: makeMemoryAdapter() };
  }
}
const _storageDetected = detectStorageAdapter();
const storageAdapter = _storageDetected.adapter;
const storageKind = _storageDetected.kind;

async function loadState(){
  try{
    const res = await storageAdapter.get(STORAGE_KEY, false);
    if(res && res.value){
      const loaded = JSON.parse(res.value);
      state = Object.assign(defaultState(), loaded);
      state.items = loaded.items || {};
      state.days = loaded.days || {};
    }
  }catch(e){
    /* first run / no key yet — keep defaults */
  }
  /* migrasi: id lama "t1-lc-fn-N" (Figural & Numerical) diganti jadi "t1-lc-diag-N" (Diagrammatical) */
  let migrated = false;
  Object.keys(state.items).forEach(key=>{
    const m = key.match(/^t1-lc-fn-(\d+)$/);
    if(m){
      const newKey = `t1-lc-diag-${m[1]}`;
      if(state.items[key] && !state.items[newKey]) state.items[newKey] = true;
      delete state.items[key];
      migrated = true;
    }
  });
  if(migrated) scheduleSave();
  if(storageKind==='memory'){
    showToast('Browser ini memblokir penyimpanan lokal — progres hanya tersimpan selama tab ini terbuka.');
  }
}
function scheduleSave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{ await storageAdapter.set(STORAGE_KEY, JSON.stringify(state), false); storageOK=true; }
    catch(e){
      storageOK=false;
      if(storageKind!=='memory') showToast('Gagal menyimpan progres — coba lagi sebentar lagi');
    }
  }, 450);
}

/* ================= UTILS ================= */
function pad(n){return String(n).padStart(2,'0');}
function toKey(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function parseKey(s){const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d);}
function addDays(d,n){const r=new Date(d); r.setDate(r.getDate()+n); return r;}
function startOfDay(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function diffDays(a,b){return Math.round((startOfDay(a)-startOfDay(b))/86400000);}
function fmtDate(d){return `${d.getDate()} ${MONTHS_ID[d.getMonth()]} ${d.getFullYear()}`;}
function fmtDateShort(d){return `${d.getDate()} ${MONTHS_ID[d.getMonth()].slice(0,3)}`;}
function today(){return startOfDay(new Date());}
function slug(s){return s.toLowerCase().replace(/\s+/g,'-');}
function escapeHtml(s){return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h=setTimeout(()=>t.classList.remove('show'),2200);
}

function currentEvents(){ return scenarios[state.scenario]; }
function findEvent(label){ return currentEvents().find(e=>e.label===label); }
function getDeadline(tahap){
  const ev = findEvent(TAHAP_META[tahap].anchorLabel);
  return addDays(parseKey(ev.start), -1);
}
function countStudyDaysInclusive(fromDate, toDate){
  let count=0, d=startOfDay(fromDate); const end=startOfDay(toDate);
  if(d>end) return 0;
  while(d<=end){ if(d.getDay()!==0) count++; d=addDays(d,1); }
  return count;
}

function countChecked(tahap, cat){

/* ================= WEEKS ================= */
function buildWeeks(){
  const weeks=[];
  let cursor = parseKey(PLAN_START);
  const end = parseKey(PLAN_END);
  while(cursor<=end){
    const days=[];
    for(let i=0;i<7;i++){
      const d = addDays(cursor,i);
      const key = toKey(d);
      days.push({ key, date:d, dow:DAYS_ID[d.getDay()], isSunday:d.getDay()===0 });
    }
    weeks.push({ start:cursor, end:addDays(cursor,6), days });
    cursor = addDays(cursor,7);
  }
  return weeks;
}
const WEEKS = buildWeeks();

function eventsOnDate(key){
  return currentEvents().filter(ev => key>=ev.start && key<=(ev.end||ev.start));
}
function liveClassesOnDate(key){
  return LIVE_CLASS_SCHEDULE.filter(lc => lc.dates.includes(key));
}
function nextLiveClass(tahap){
  const t = toKey(today());
  let best=null;
  LIVE_CLASS_SCHEDULE.filter(lc=>lc.tahap===tahap).forEach(lc=>{
    lc.dates.filter(d=>d>=t).forEach(d=>{
      if(!best || d<best.date) best={date:d, subtes:lc.subtes, label:lc.label};
    });
  });
  return best;
}
function dayRecord(key){

/* ================= REKOMENDASI HARIAN ================= */
const SUBTES_MAP = {
  1:{'Verbal':['verbal'], 'Numerikal':['num'], 'Digit Symbol':['ds'], 'Diagrammatical':['diag','fn']},
  2:{'TPU':['tpu'], 'TPK':['tpk'], 'Bahasa Inggris':['tbiw','tbis','tbir']},
  3:{'RGD':['rgd'], 'Interview':['interview'], 'Speed Test':['speed']}
};
function itemMatchesSubtes(it, tahap, subtes){
  const codes = (SUBTES_MAP[tahap]||{})[subtes] || [];
  return codes.some(code => it.id.includes('-'+code+'-') || it.id.includes('-'+code));
}
function currentCategoryFor(tahap){
  const meta = TAHAP_META[tahap];
  for(const cat of meta.categories){
    if(countChecked(tahap,cat) < countTotal(tahap,cat)) return cat;
  }
  return meta.categories[meta.categories.length-1];
}
function currentSubtesFor(tahap, cat){
  const subtesNames = Object.keys(SUBTES_MAP[tahap]||{});
  let best=null, bestRemaining=-1;
  subtesNames.forEach(sub=>{
    const items = ITEMS.filter(it=>it.tahap===tahap && it.cat===cat && itemMatchesSubtes(it,tahap,sub));
    if(!items.length) return;
    const remaining = items.filter(it=>!state.items[it.id]).length;
    if(remaining>bestRemaining){ bestRemaining=remaining; best=sub; }
  });
  if(best) return best;
  if(cat==='Materi') return 'Semua materi';
  if(cat==='Tryout') return 'Gabungan semua subtes';
  return subtesNames[0] || 'Umum';
}
function paceForTahap(tahap){
  const deadline = getDeadline(tahap);
  const total = countTotal(tahap), checked = countChecked(tahap), remaining = total-checked;
  if(remaining<=0) return {perDay:0, deadline, remaining:0, done:true};
  const sd = today()<=deadline ? countStudyDaysInclusive(today(), deadline) : 0;
  const perDay = today()>deadline ? remaining : Math.max(1, Math.ceil(remaining/Math.max(sd,1)));
  return {perDay, deadline, remaining, done:false};
}
function autoRecommendation(tahap){
  const cat = currentCategoryFor(tahap);
  const subtes = currentSubtesFor(tahap, cat);
  const pace = paceForTahap(tahap);
  return { tahap, kategori:cat, subtes, perDay:pace.perDay, done:pace.done, deadline:pace.deadline };
}
function recommendationFor(dKey, tahap){
  const rec = dayRecord(dKey);
  const manual = rec.manualRec && rec.manualRec[tahap];
  const auto = autoRecommendation(tahap);
  if(manual && manual.kategori && manual.subtes){
    return { tahap, kategori:manual.kategori, subtes:manual.subtes, perDay:auto.perDay, done:auto.done, deadline:auto.deadline, manual:true };
  }
  return auto;
}
function setManualRecommendation(dKey, tahap, field, value){
  const rec = dayRecord(dKey);
  if(!rec.manualRec) rec.manualRec = {};
  if(!rec.manualRec[tahap]) rec.manualRec[tahap] = {};
  if(value===''){ delete rec.manualRec[tahap][field]; }
  else{ rec.manualRec[tahap][field] = value; }
  scheduleSave();
}

function roadmapCardHtml(){
  const chartStart = parseKey(PLAN_START);
  const deadlines = {1:getDeadline(1), 2:getDeadline(2), 3:getDeadline(3)};
  let chartEnd = deadlines[1];
  [2,3].forEach(t=>{ if(deadlines[t]>chartEnd) chartEnd = deadlines[t]; });
  chartEnd = addDays(chartEnd, 3);
  const totalSpan = Math.max(1, diffDays(chartEnd, chartStart));
  const xPct = (d)=> Math.max(0, Math.min(100, (diffDays(d, chartStart)/totalSpan)*100));

  const ticks = [];
  let cursor = new Date(chartStart.getFullYear(), chartStart.getMonth()+1, 1);
  while(cursor <= chartEnd){
    ticks.push(new Date(cursor));
    cursor = new Date(cursor.getFullYear(), cursor.getMonth()+1, 1);
  }
  const tickHtml = ticks.map(d=>{
    const pct = xPct(d);
    return `<div class="rm-tick" style="left:${pct}%"><span class="rm-tick-label">1 ${MONTHS_ID[d.getMonth()].slice(0,3)}</span></div>`;
  }).join('');

  const rowClass = {1:'rm-t1', 2:'rm-t2', 3:'rm-t3'};
  const rows = [1,2,3].map(t=>{
    const pct = xPct(deadlines[t]);
    return `
      <div class="rm-row">
        <div class="rm-label">Tahap ${t}</div>
        <div class="rm-track">
          <div class="rm-bar ${rowClass[t]}" style="width:${pct}%"></div>
          <div class="rm-cutoff" style="left:${pct}%"></div>
        </div>
      </div>`;
  }).join('');

  const todayPct = xPct(today());
  const todayMarker = `
    <div class="rm-today" style="left:${todayPct}%">
      <div class="rm-today-pill">${fmtDate(today())}</div>
      <div class="rm-today-line"></div>
    </div>`;

  return `
    <div class="card roadmap-wrap">
      <div class="section-title">Roadmap Tahap 1/2/3</div>
      <p style="font-size:12.5px;color:var(--ink-soft);margin:0 0 18px;">Ketiganya sengaja overlap — dikerjakan paralel sejak hari pertama, masing-masing punya tenggat beda sebelum tesnya sendiri. Garis tegak putus-putus = posisi hari ini.</p>
      <div class="rm-chart">
        ${todayMarker}
        ${rows}
        <div class="rm-axis">${tickHtml}</div>
        <div class="rm-axis-edges">
          <span>${fmtDateShort(chartStart)}</span>
          <span>${fmtDateShort(chartEnd)}</span>
        </div>
      </div>
    </div>`;
}

    <blockquote class="twitter-tweet" data-dnt="true">
      <a href="${url}"></a>
    </blockquote>`;
  if(window.twttr && window.twttr.widgets) window.twttr.widgets.load(el);
}

/* ================= RENDER: DASHBOARD ================= */
let showAllTickets = false;

function renderDashboard(){
  const t = today();
  const dKey = toKey(t);
  const rec = dayRecord(dKey);
  const evToday = eventsOnDate(dKey);
  const isSunday = t.getDay()===0;

  /* --- hero --- */
  document.getElementById('dashHero').innerHTML = heroTicketHtml();

  /* --- today strip --- */
  let badges = '';
  if(isSunday) badges += `<span class="badge sun">Minggu · fokus YouTube/siaran pers</span>`;
  evToday.forEach(ev=> badges += `<span class="badge event">${escapeHtml(ev.label)}</span>`);
  liveClassesOnDate(dKey).forEach(lc=> badges += `<span class="badge live">${escapeHtml(lc.label)} (${escapeHtml(lc.subtes)})</span>`);

  document.getElementById('dashToday').innerHTML = `
    <div class="card today-card">
      <div class="today-left">
        <div class="date-big">${fmtDate(t)} · ${DAYS_ID[t.getDay()]}</div>
        <div class="date-sub">${evToday.length? 'Ada agenda seleksi resmi hari ini (skenario aktif).' : 'Hari belajar biasa.'}</div>
        <div class="today-badges">${badges}</div>
      </div>
      <label class="studied-toggle">
        <input type="checkbox" data-action="toggle-studied" data-key="${dKey}" ${rec.studied?'checked':''}>
        <span class="st-dot"></span>
        Sudah belajar hari ini
      </label>
    </div>`;

  /* --- recommendation --- */
  document.getElementById('dashRec').innerHTML = recCardHtml(dKey);

  /* --- progress --- */
  const pct = Math.round((overallChecked()/TOTAL_ITEMS)*100);
  const tahapCards = [1,2,3].map(t2=>{
    const checked=countChecked(t2), total=countTotal(t2);
    const pct2 = Math.round((checked/total)*100);
    const deadline = getDeadline(t2);
    const remaining = total-checked;
    const sd = today()<=deadline ? countStudyDaysInclusive(today(), deadline) : 0;
    let paceText;
    if(remaining<=0){ paceText = 'Tuntas ✓'; }
    else if(today()>deadline){ paceText = 'Tenggat sudah lewat — fokus review cepat.'; }
    else{
      const perDay = Math.max(1, Math.ceil(remaining/Math.max(sd,1)));
      const weeks = Math.max(1, Math.ceil(diffDays(deadline,today())/7));
      const perWeek = Math.ceil(remaining/weeks);
      paceText = `Target ±${perDay} item / hari belajar (±${perWeek}/minggu)`;
    }
    return `
      <div class="tahap-mini tm-${t2}">
        <h4>${TAHAP_META[t2].title}</h4>
        <div class="frac" id="dashFrac${t2}">${checked}/${total} (${pct2}%)</div>
        <div class="progress-bar"><div class="progress-fill" id="dashBar${t2}" style="width:${pct2}%"></div></div>
        <div class="pace" id="dashPace${t2}">${paceText}</div>
        <div class="deadline">Target tuntas: ${fmtDate(deadline)}</div>
      </div>`;
  }).join('');

  document.getElementById('dashProgress').innerHTML = `
    <div class="card overall-wrap" style="margin-top:14px;">
      <div class="section-title">Progres Keseluruhan</div>
      <div class="overall-row">
        <span>${overallChecked()} / ${TOTAL_ITEMS} item</span>
        <span class="num" id="overallPct">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="overallBar" style="width:${pct}%"></div></div>
    </div>
    <div class="grid-3" style="margin-top:12px;">${tahapCards}</div>`;

  /* --- roadmap --- */
  document.getElementById('dashRoadmap').innerHTML = roadmapCardHtml();

  /* --- timeline + scenario --- */
  renderTimeline();

  /* --- footer --- */
  document.getElementById('dashFooter').innerHTML = `
    <div class="info-callout">
      <b>Strategi:</b> Tahap 1 &amp; Tahap 2 dikerjakan <b>paralel</b> sejak hari pertama — jarak TPD ke tes TPU/TPK/TBI cuma ±2 minggu, terlalu sempit kalau Tahap 2 baru dimulai setelah Tahap 1 kelar. Tahap 3 (RGD/Interview) baru perlu mulai aktif menjelang Tes Kesehatan, tapi sudah tersedia dari sekarang kalau mau intip lebih awal. Urutan belajar per Tahap selalu <b>Live Class → Materi → Booster → Tryout</b> — rekomendasi harian mengikuti urutan ini. Minggu selalu jadi hari non-konten berkarirBI (catatan YouTube/siaran pers + buffer kegiatan).
    </div>
    <div class="reset-row">
      <button class="btn-ghost danger" id="resetBtn" data-action="reset-confirm">Reset semua progres</button>
    </div>
    <div class="build-stamp mono">build ${BUILD_VERSION} · penyimpanan: ${storageKind}</div>`;
}

function renderTimeline(){
  const t = today();
  const dKey = toKey(t);
  const events = currentEvents();
  const upcoming = events.filter(e => (e.end||e.start) >= dKey);
  const shown = showAllTickets ? events : upcoming.slice(0,8);
  const hiddenCount = events.length - shown.length;

  const tickets = shown.map(ev=>{
    const sd = parseKey(ev.start);
    const h = diffDays(sd, t);
    const isPast = (ev.end||ev.start) < dKey;
    const isNext = !isPast && upcoming[0] === ev;
    return `
      <div class="ticket ${isNext?'next':''} ${isPast?'past':''}">
        <div class="ticket-date"><div class="d">${sd.getDate()}</div><div class="m">${MONTHS_ID[sd.getMonth()].slice(0,3)}</div></div>
        <div class="ticket-body">
          <div class="lbl">${escapeHtml(ev.label)}</div>
          <div class="range">${ev.end? fmtDateShort(parseKey(ev.start))+' – '+fmtDateShort(parseKey(ev.end)) : fmtDate(sd)}</div>
          <div class="hbadge">${isPast? 'LEWAT' : (h>0? 'H-'+h : (h===0?'HARI INI':''))}</div>
        </div>
      </div>`;
  }).join('');

  const moreBtn = `
    <button class="timeline-more" data-action="toggle-tickets">
      ${showAllTickets ? 'Tampilkan ringkas (8 terdekat)' : `Tampilkan semua ${events.length} tahapan${hiddenCount>0? ' (+'+hiddenCount+')':''}`}
    </button>`;

  document.getElementById('dashTimeline').innerHTML = `
    <div class="card timeline-card">
      <div class="section-title">Skenario Tanggal Online Application</div>
      <p style="font-size:12.5px;color:var(--ink-soft);margin:0;">Belum ada jadwal resmi PCPM 41. Pilih skenario untuk menggeser semua tenggat &amp; tanggal tes di bawah secara otomatis.</p>
      <div class="seg" role="group" aria-label="Pilih skenario">
        <button class="seg-btn ${state.scenario==='agustus'?'active':''}" data-action="set-scenario" data-value="agustus">
          Agustus<span class="seg-sub">worst case</span>
        </button>
        <button class="seg-btn ${state.scenario==='september'?'active':''}" data-action="set-scenario" data-value="september">
          September<span class="seg-sub">moderat · seperti PCPM 40</span>
        </button>
      </div>
      <div class="ticket-grid">${tickets}</div>
      ${moreBtn}
    </div>`;
}

function refreshDashboardLive(){
  const pct = Math.round((overallChecked()/TOTAL_ITEMS)*100);
  const overallPct = document.getElementById('overallPct');
  const overallBar = document.getElementById('overallBar');
  if(overallPct){ overallPct.textContent = pct+'%'; overallBar.style.width = pct+'%'; }
  [1,2,3].forEach(t2=>{
    const checked=countChecked(t2), total=countTotal(t2);
    const pct2 = Math.round((checked/total)*100);
    const fracEl=document.getElementById('dashFrac'+t2), barEl=document.getElementById('dashBar'+t2), paceEl=document.getElementById('dashPace'+t2);
    if(fracEl){
      fracEl.textContent = `${checked}/${total} (${pct2}%)`;
      barEl.style.width = pct2+'%';
      const deadline=getDeadline(t2), remaining=total-checked;
      const sd = today()<=deadline ? countStudyDaysInclusive(today(),deadline) : 0;
      let paceText;
      if(remaining<=0) paceText='Tuntas ✓';
      else if(today()>deadline) paceText='Tenggat sudah lewat — fokus review cepat.';
      else{
        const perDay=Math.max(1,Math.ceil(remaining/Math.max(sd,1)));
        const weeks=Math.max(1,Math.ceil(diffDays(deadline,today())/7));
        const perWeek=Math.ceil(remaining/weeks);
        paceText=`Target ±${perDay} item / hari belajar (±${perWeek}/minggu)`;
      }
      paceEl.textContent = paceText;
    }
  });
  const meta = document.getElementById('headerMeta');
  if(meta) meta.children[2].textContent = `${overallChecked()}/${TOTAL_ITEMS} item selesai`;
  renderNavCounts();
}

/* ================= RENDER: TAHAP TABS ================= */
function renderTahap(tahap){
  const meta = TAHAP_META[tahap];
  const checked=countChecked(tahap), total=countTotal(tahap);
  const head = `
    <div class="tahap-head">
      <div><h2>${meta.title}</h2><div class="sub">${meta.sub}</div></div>
      <div class="total-frac">${checked}/${total} selesai</div>
    </div>`;
  const cats = meta.categories.map((cat,idx)=>{
    const items = ITEMS.filter(it=>it.tahap===tahap && it.cat===cat);
    const c=countChecked(tahap,cat), tt=countTotal(tahap,cat);
    const pct = Math.round((c/tt)*100);
    const rows = items.map(it=>`
      <div class="item-row">
        <label>
          <input type="checkbox" class="item-checkbox" data-action="toggle-item" data-id="${it.id}" ${state.items[it.id]?'checked':''}>
          <span class="stamp"></span>
          <span class="item-label">${escapeHtml(it.label)}</span>
        </label>
      </div>`).join('');
    return `
      <div class="category ${c===tt?'is-done':''}" data-cat="${tahap}-${slug(cat)}">
        <div class="category-head" data-action="toggle-cat" data-cat="${tahap}-${slug(cat)}">
          <span class="step-tag">${idx+1}</span>
          <h3>${cat}</h3>
          <span class="done-seal">TUNTAS</span>
          <span class="cfrac" id="catFrac-${tahap}-${slug(cat)}">${c}/${tt}</span>
          <span class="chev">▾</span>
        </div>
        <div class="category-bar"><div class="category-bar-fill" id="catBar-${tahap}-${slug(cat)}" style="width:${pct}%"></div></div>
        <div class="item-list">${rows}</div>
      </div>`;
  }).join('');
  document.getElementById('panel-t'+tahap).innerHTML = head + cats;
}

function refreshTahapLive(tahap, cat){
  const c=countChecked(tahap,cat), tt=countTotal(tahap,cat);
  const pct=Math.round((c/tt)*100);
  const fracEl=document.getElementById(`catFrac-${tahap}-${slug(cat)}`);
  const barEl=document.getElementById(`catBar-${tahap}-${slug(cat)}`);
  if(fracEl){ fracEl.textContent=`${c}/${tt}`; barEl.style.width=pct+'%'; }
  const catEl = document.querySelector(`.category[data-cat="${tahap}-${slug(cat)}"]`);
  if(catEl) catEl.classList.toggle('is-done', c===tt);
  const panel=document.getElementById('panel-t'+tahap);
  if(panel){
    const totalFracEl=panel.querySelector('.total-frac');
    if(totalFracEl) totalFracEl.textContent = `${countChecked(tahap)}/${countTotal(tahap)} selesai`;
  }
}

/* ================= RENDER: WEEKLY ================= */
function weekStatus(week){
  let studiedDays=0, sundays=0;
  week.days.forEach(d=>{ const r=state.days[d.key]; if(r&&r.studied) studiedDays++; if(d.isSunday) sundays++; });
  return `${studiedDays}/${7-sundays} hari aktif`;
}
function isCurrentWeek(week){
  const t = today();
  return t>=week.start && t<=week.end;
}
function renderWeekly(){
  let html = `<div class="card" style="margin-bottom:14px;"><div class="section-title">Rencana Mingguan</div>
    <p style="font-size:12.5px;color:var(--ink-soft);margin:0;">Centang hari yang sudah dipakai belajar, dan tulis catatan singkat kalau perlu. Minggu (hari ke-7) sengaja dikosongkan dari konten berkarirBI — dipakai untuk catatan YouTube/siaran pers atau buffer kegiatan.</p></div>`;

  WEEKS.forEach((week, wi)=>{
    const cur = isCurrentWeek(week);
    const collapsed = !cur;
    const dayRows = week.days.map(d=>{
      const rec = dayRecord(d.key);
      const evs = eventsOnDate(d.key);
      let badges='';
      if(d.isSunday) badges += `<span class="badge sun">Non-konten</span>`;
      evs.forEach(ev=> badges += `<span class="badge event" title="${escapeHtml(ev.label)}">${escapeHtml(ev.label.length>16? ev.label.slice(0,15)+'…':ev.label)}</span>`);
      liveClassesOnDate(d.key).forEach(lc=> badges += `<span class="badge live" title="${escapeHtml(lc.label)} — ${escapeHtml(lc.subtes)}">${escapeHtml(lc.subtes)}</span>`);
      return `
        <div class="day-row ${d.isSunday?'is-sunday':''}">
          <span class="dname">${d.dow.slice(0,3)} ${d.date.getDate()}/${d.date.getMonth()+1}</span>
          <span class="day-badges">${badges}</span>
          <input type="text" class="note-input" data-action="set-note" data-key="${d.key}" value="${escapeHtml(rec.note||'')}" placeholder="Catatan singkat...">
          <input type="checkbox" class="day-checkbox" data-action="toggle-studied" data-key="${d.key}" ${rec.studied?'checked':''} title="Sudah belajar">
        </div>`;
    }).join('');

    html += `
      <div class="week-card ${cur?'current':''} ${collapsed?'collapsed':''}" data-week="${wi}">
        <div class="week-head" data-action="toggle-week" data-week="${wi}">
          <span class="wnum">M${wi+1}</span>
          <span class="wrange">${fmtDateShort(week.start)} – ${fmtDateShort(week.end)}${cur?' · minggu ini':''}</span>
          <span class="wstat">${weekStatus(week)}</span>
          <span class="chev">▾</span>
        </div>
        <div class="week-body">${dayRows}</div>
      </div>`;
  });
  document.getElementById('panel-weekly').innerHTML = html;
}

/* ================= EVENT DELEGATION ================= */
document.getElementById('tabs').addEventListener('click', (e)=>{
  const btn = e.target.closest('.tab-btn'); if(!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
});

document.getElementById('app').addEventListener('click', (e)=>{
  const catHead = e.target.closest('[data-action="toggle-cat"]');
  if(catHead){
    document.querySelector(`.category[data-cat="${catHead.dataset.cat}"]`).classList.toggle('collapsed');
    return;
  }
  const tweetPrev = e.target.closest('[data-action="tweet-prev"]');
  if(tweetPrev){
    tweetIndex = (tweetIndex - 1 + TWEET_URLS.length) % TWEET_URLS.length;
    renderTweet();
    return;
  }
  const tweetNext = e.target.closest('[data-action="tweet-next"]');
  if(tweetNext){
    tweetIndex = (tweetIndex + 1) % TWEET_URLS.length;
    renderTweet();
    return;
  }
  const scenarioBtn = e.target.closest('[data-action="set-scenario"]');
  if(scenarioBtn){
    if(state.scenario !== scenarioBtn.dataset.value){
      state.scenario = scenarioBtn.dataset.value;
      scheduleSave();
      renderDashboard();
      renderWeekly();
    }
    return;
  }
  const ticketsBtn = e.target.closest('[data-action="toggle-tickets"]');
  if(ticketsBtn){
    showAllTickets = !showAllTickets;
    renderTimeline();
    return;
  }
  const weekHead = e.target.closest('[data-action="toggle-week"]');
  if(weekHead){
    document.querySelector(`.week-card[data-week="${weekHead.dataset.week}"]`).classList.toggle('collapsed');
    return;
  }
  const resetBtn = e.target.closest('[data-action="reset-confirm"]');
  if(resetBtn){
    if(resetBtn.dataset.armed==='1'){
      state = defaultState();
      scheduleSave();
      renderAll();
      showToast('Semua progres direset.');
    }else{
      resetBtn.dataset.armed='1';
      resetBtn.textContent='Yakin? Klik sekali lagi untuk reset total';
      setTimeout(()=>{ resetBtn.dataset.armed='0'; resetBtn.textContent='Reset semua progres'; }, 4000);
    }
    return;
  }
});

document.getElementById('app').addEventListener('change', (e)=>{
  const itemCb = e.target.closest('[data-action="toggle-item"]');
  if(itemCb){
    const id = itemCb.dataset.id;
    state.items[id] = itemCb.checked;
    scheduleSave();
    const it = ITEMS_BY_ID[id];
    refreshTahapLive(it.tahap, it.cat);
    refreshDashboardLive();
    return;
  }
  const studiedCb = e.target.closest('[data-action="toggle-studied"]');
  if(studiedCb){
    const rec = dayRecord(studiedCb.dataset.key);
    rec.studied = studiedCb.checked;
    scheduleSave();
    document.querySelectorAll(`[data-action="toggle-studied"][data-key="${studiedCb.dataset.key}"]`).forEach(el=> el.checked = rec.studied);
    const week = WEEKS.find(w=> w.days.some(d=>d.key===studiedCb.dataset.key));
    if(week){
      const wi = WEEKS.indexOf(week);
      const wstatEl = document.querySelector(`.week-card[data-week="${wi}"] .wstat`);
      if(wstatEl) wstatEl.textContent = weekStatus(week);
    }
    return;
  }
  const noteInput = e.target.closest('[data-action="set-note"]');
  if(noteInput){
    const rec = dayRecord(noteInput.dataset.key);
    rec.note = noteInput.value;
    scheduleSave();
    return;
  }
  const recSelect = e.target.closest('[data-action="set-rec"]');
  if(recSelect){
    setManualRecommendation(recSelect.dataset.key, Number(recSelect.dataset.tahap), recSelect.dataset.field, recSelect.value);
    document.getElementById('dashRec').innerHTML = recCardHtml(recSelect.dataset.key);
    return;
  }
});

/* ================= INIT ================= */
function renderAll(){
  renderHeaderMeta();
  renderNavCounts();
  renderDashboard();
  renderTweet();
  renderTahap(1);
  renderTahap(2);
  renderTahap(3);
  renderWeekly();
}

(async function init(){
  console.log(`[FokusCapital] build ${BUILD_VERSION} · storage mode: ${storageKind}`);
  await loadState();
  renderAll();
})();

})();
